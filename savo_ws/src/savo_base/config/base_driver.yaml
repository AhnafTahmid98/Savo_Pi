
base_driver_node:
  ros__parameters:
    # -------------------------------------------------------------------------
    # Topics
    # -------------------------------------------------------------------------
    cmd_topic: "/cmd_vel_safe"
    safety_stop_topic: "/safety/stop"
    slowdown_topic: "/safety/slowdown_factor"

    use_safety_stop: true
    use_slowdown_factor: true

    slowdown_default: 1.0
    slowdown_min: 0.0
    slowdown_max: 1.0

    # -------------------------------------------------------------------------
    # Loop / watchdog / status rates
    # -------------------------------------------------------------------------
    loop_hz: 30.0
    watchdog_timeout_s: 0.30
    publish_status_hz: 2.0

    # -------------------------------------------------------------------------
    # Command-space limits (normalized — not physical m/s)
    # -------------------------------------------------------------------------
    vx_limit: 1.0
    vy_limit: 1.0
    wz_limit: 1.0

    # -------------------------------------------------------------------------
    # Motor output scaling
    # 3000 = conservative safe default; PCA9685 absolute max is 4095
    # -------------------------------------------------------------------------
    max_duty: 3000
    turn_gain: 1.0

    # -------------------------------------------------------------------------
    # Mecanum conventions
    # -------------------------------------------------------------------------
    forward_sign: -1
    strafe_sign: 1
    rotate_sign: 1

    # -------------------------------------------------------------------------
    # Board backend
    # -------------------------------------------------------------------------
    # "auto" lets the factory pick — use "dryrun" for no-hardware testing
    board_backend: "auto"
    board_name: "robot_savo_freenove_mecanum"
    dryrun: false

    # -------------------------------------------------------------------------
    # Freenove / PCA9685 hardware settings
    # -------------------------------------------------------------------------
    i2c_bus: 1
    pca9685_addr: "0x40"
    pwm_freq_hz: 50.0
    quench_ms: 18

    # -------------------------------------------------------------------------
    # Per-wheel invert flags — change only after wheel direction test
    # -------------------------------------------------------------------------
    invert_fl: false
    invert_rl: false
    invert_fr: false
    invert_rr: false

    # -------------------------------------------------------------------------
    # Status output topics
    # -------------------------------------------------------------------------
    watchdog_state_topic: "/savo_base/watchdog_state"
    base_state_topic: "/savo_base/base_state"
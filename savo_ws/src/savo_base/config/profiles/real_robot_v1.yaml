# Real robot production profile — Freenove PCA9685 hardware, safety gate upstream.

/base_driver_node:
  ros__parameters:

    cmd_topic: "/cmd_vel_safe"
    safety_stop_topic: "/safety/stop"
    slowdown_topic: "/safety/slowdown_factor"
    watchdog_state_topic: "/savo_base/watchdog_state"
    base_state_topic: "/savo_base/base_state"

    use_safety_stop: true
    use_slowdown_factor: true

    slowdown_default: 1.0
    slowdown_min: 0.0
    slowdown_max: 1.0

    loop_hz: 30.0
    watchdog_timeout_s: 0.30
    publish_status_hz: 2.0

    # conservative but usable for indoor testing
    vx_limit: 0.80
    vy_limit: 0.70
    wz_limit: 0.70

    # 3000 = proven safe cap; PCA9685 max is 4095
    max_duty: 3000
    turn_gain: 1.0

    forward_sign: -1
    strafe_sign: 1
    rotate_sign: 1

    board_backend: "freenove"
    board_name: "robot_savo_freenove_mecanum"
    dryrun: false

    i2c_bus: 1
    pca9685_addr: "0x40"
    pwm_freq_hz: 50.0
    quench_ms: 18

    # change only after wheel direction test confirms a wiring reversal
    invert_fl: false
    invert_rl: false
    invert_fr: false
    invert_rr: false
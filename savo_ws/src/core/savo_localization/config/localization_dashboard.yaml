localization_dashboard:
  ros__parameters:
    refresh_rate_hz: 5.0
    stale_timeout_s: 0.5

    imu_topic: /imu/data
    imu_state_topic: /savo_localization/imu_state

    wheel_odom_topic: /wheel/odom
    wheel_odom_state_topic: /savo_localization/wheel_odom_state

    filtered_odom_topic: /odometry/filtered
    health_topic: /savo_localization/health
    state_summary_topic: /savo_localization/state_summary

    diagnostics_topic: /diagnostics

    map_frame_id: map
    odom_frame_id: odom
    base_frame_id: base_link
    imu_frame_id: imu_link

    show_imu: true
    show_encoders: true
    show_wheel_odom: true
    show_ekf: true
    show_tf: true
    show_diagnostics: true

    show_raw_json: false
    show_rates: true
    show_reasons: true
    show_wheel_table: true

    expected_imu_rate_hz: 25.0
    expected_wheel_odom_rate_hz: 30.0
    expected_ekf_rate_hz: 30.0

    max_imu_age_s: 0.5
    max_wheel_odom_age_s: 0.5
    max_filtered_odom_age_s: 0.5
    max_tf_age_s: 0.5

    max_odom_linear_speed_mps: 1.5
    max_odom_angular_speed_rad_s: 4.0

    compact_mode: false
    color_enabled: true
    clear_screen: true
    print_header: true
    print_footer: true

    warn_on_stale: true
    warn_on_missing_topic: true
    warn_on_bad_tf: true
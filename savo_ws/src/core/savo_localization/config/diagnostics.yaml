localization_health_node:
  ros__parameters:
    publish_rate_hz: 2.0
    stale_timeout_s: 0.5

    use_imu: true
    use_encoders: true
    use_wheel_odom: true
    use_ekf: true
    use_vo: false

    require_odom_to_base_tf: true
    require_base_to_imu_tf: true

    expected_imu_rate_hz: 25.0
    expected_wheel_odom_rate_hz: 30.0
    expected_ekf_rate_hz: 30.0
    expected_vo_rate_hz: 15.0

    rate_window_size: 30
    rate_tolerance_ratio: 0.50

    max_imu_age_s: 0.5
    max_wheel_odom_age_s: 0.5
    max_filtered_odom_age_s: 0.5
    max_vo_odom_age_s: 0.5
    max_tf_age_s: 0.5

    max_odom_linear_speed_mps: 1.5
    max_odom_angular_speed_rad_s: 4.0

    max_pose_jump_m: 0.50
    max_yaw_jump_rad: 1.00

    min_valid_encoder_wheels: 4
    max_encoder_illegal_transitions: 20

    imu_require_motion_ready: true
    imu_require_mag_ready: false

    publish_full_state: true
    publish_compact_summary: true
    log_warnings: true
    log_errors: true


localization_dashboard:
  ros__parameters:
    refresh_rate_hz: 5.0
    stale_timeout_s: 0.5

    show_imu: true
    show_encoders: true
    show_wheel_odom: true
    show_ekf: true
    show_vo: false
    show_tf: true
    show_diagnostics: true

    show_raw_json: false
    show_rates: true
    show_reasons: true
    show_wheel_table: true
    show_covariance: false

    expected_imu_rate_hz: 25.0
    expected_wheel_odom_rate_hz: 30.0
    expected_ekf_rate_hz: 30.0
    expected_vo_rate_hz: 15.0

    max_imu_age_s: 0.5
    max_wheel_odom_age_s: 0.5
    max_filtered_odom_age_s: 0.5
    max_vo_odom_age_s: 0.5
    max_tf_age_s: 0.5

    max_odom_linear_speed_mps: 1.5
    max_odom_angular_speed_rad_s: 4.0

    compact_mode: false
    color_enabled: true
    clear_screen: true
    print_header: true
    print_footer: true

    warn_on_stale: true
    warn_on_missing_topic: true
    warn_on_bad_tf: true


ekf_state_publisher_node:
  ros__parameters:
    publish_rate_hz: 2.0
    stale_timeout_s: 0.5

    include_pose: true
    include_twist: true
    include_rates: true
    include_tf_status: true

    max_filtered_odom_age_s: 0.5
    max_tf_age_s: 0.5

    log_warnings: true


wheel_odom_fallback_node:
  ros__parameters:
    enabled: false

    publish_rate_hz: 20.0
    timeout_s: 0.5

    wheel_odom_topic: /wheel/odom
    wheel_odom_state_topic: /savo_localization/wheel_odom_state

    odom_frame_id: odom
    base_frame_id: base_link

    max_odom_linear_speed_mps: 1.5
    max_odom_angular_speed_rad_s: 4.0

    publish_tf: false
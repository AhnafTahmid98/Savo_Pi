      - false  # vroll
      - false  # vpitch
      - true   # vyaw
      - false  # ax
      - false  # ay
      - false  # az
    imu0_queue_size: 20
    imu0_nodelay: false
    imu0_differential: false
    imu0_relative: false
    imu0_pose_rejection_threshold: 1.0
    imu0_twist_rejection_threshold: 1.0
    imu0_remove_gravitational_acceleration: false


ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true

    transform_time_offset: 0.0
    transform_timeout: 0.0

    print_diagnostics: true
    debug: false
    debug_out_file: /tmp/savo_localization_ekf_debug.txt

    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /wheel/odom
    odom0_config:
      - false  # x
      - false  # y
      - false  # z
      - false  # roll
      - false  # pitch
      - false  # yaw
      - true   # vx
      - true   # vy
      - false  # vz
      - false  # vroll
      - false  # vpitch
      - true   # vyaw
      - false  # ax
      - false  # ay
      - false  # az
    odom0_queue_size: 10
    odom0_nodelay: false
    odom0_differential: false
    odom0_relative: false
    odom0_twist_rejection_threshold: 1.5

    imu0: /imu/data
    imu0_config:
      - false  # x
      - false  # y
      - false  # z
      - false  # roll
      - false  # pitch
      - true   # yaw
      - false  # vx
      - false  # vy

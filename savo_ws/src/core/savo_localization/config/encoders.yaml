# Rear-wheel encoders only: lateral velocity is not observable, so odom reports vy=0.

wheel_odom_node:
  ros__parameters:
    # BCM numbering.
    left_a: 21
    left_b: 20
    right_a: 12
    right_b: 26

    # Forward drive counts positive with the current motor wiring.
    invert_left: true
    invert_right: true

    # 20 CPR with x4 decoding matches quadrature edge counting.
    wheel_dia_m: 0.065
    cpr: 20
    decoding: 4
    gear: 1.0
    track_m: 0.165

    publish_hz: 50.0
    # Fast polling keeps quadrature edges reliable on Pi GPIO.
    poll_hz: 2000.0

    # 300us matches the bench encoder tests.
    debounce_us: 300
    # External pull-ups are installed on the encoder lines.
    use_pullups: false
    # -1 autodetects the GPIO chip.
    gpiochip: -1

    # EKF owns odom -> base_link TF; wheel odom only stamps messages with these frames.
    frame_odom: "odom"
    frame_base: "base_link"

    # Rear-only mecanum odom cannot measure lateral motion, so y/vy stay loose.
    cov_x: 0.02
    cov_y: 0.50
    cov_yaw: 0.05
    cov_vx: 0.05
    cov_vy: 1.00
    cov_wz: 0.05


/base_driver_node:
  ros__parameters:

    # -------------------------------------------------------------------------
    # Command watchdog
    # -------------------------------------------------------------------------
    # 0.30s — matches perception/localization stack timing
    watchdog_timeout_s: 0.30

    # -------------------------------------------------------------------------
    # Timing
    # -------------------------------------------------------------------------
    loop_hz: 30.0
    publish_status_hz: 2.0

    use_safety_stop: true
    use_slowdown_factor: true

    # 1.0 = full speed, 0.0 = full stop
    slowdown_default: 1.0
    slowdown_min: 0.0
    slowdown_max: 1.0

    # -------------------------------------------------------------------------
    # Additional timeouts
    # -------------------------------------------------------------------------
    safety_stop_stale_timeout_s: 0.50
    slowdown_stale_timeout_s: 0.50
    board_command_ack_timeout_s: 0.10
    board_init_timeout_s: 2.00
    estop_input_stale_timeout_s: 0.20
    diagnostics_publish_timeout_s: 1.00

    # -------------------------------------------------------------------------
    # Watchdog policy
    # -------------------------------------------------------------------------
    watchdog_enabled: true
    watchdog_auto_rearm: true
    watchdog_zero_on_trip: true
    watchdog_warning_ratio: 0.70

    stale_policy_zero_on_stale: true
    stale_policy_hold_last_on_stale: false

    estop_auto_rearm: false
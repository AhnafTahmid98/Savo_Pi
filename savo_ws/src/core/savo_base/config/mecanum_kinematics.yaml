
/base_driver_node:
  ros__parameters:
    # -------------------------------------------------------------------------
    # Core geometry (physical)
    # -------------------------------------------------------------------------
    wheel_diameter_m: 0.065
    wheel_radius_m: 0.0325

    track_width_m: 0.165

    # measure on real robot and update if needed
    wheelbase_m: 0.165

    # k = (wheelbase + track) / 2 — used in mecanum mixing formulas
    compute_k_from_geometry: true
    kinematic_k_m: 0.165   # used only if compute_k_from_geometry = false

    # -------------------------------------------------------------------------
    # Command conventions
    # -------------------------------------------------------------------------
    forward_sign: -1
    strafe_sign: -1
    rotate_sign: -1

    turn_gain: 1.0

    # -------------------------------------------------------------------------
    # Mixer normalization
    # -------------------------------------------------------------------------
    normalize_output: true
    clamp_input: true
    vx_limit: 1.0
    vy_limit: 1.0
    wz_limit: 1.0

    deadband_vx: 0.00
    deadband_vy: 0.00
    deadband_wz: 0.00

    wheel_order: ["FL", "RL", "FR", "RR"]

    # change only after wheel direction test confirms a wiring reversal
    invert_fl: true
    invert_rl: true
    invert_fr: true
    invert_rr: true

    # -------------------------------------------------------------------------
    # Physical limits (not used by current normalized execution)
    # -------------------------------------------------------------------------
    use_physical_limits: false
    max_linear_x_mps: 0.50
    max_linear_y_mps: 0.40
    max_angular_z_radps: 1.50

    # -------------------------------------------------------------------------
    # Encoder / odometry
    # -------------------------------------------------------------------------
    encoder_cpr: 20
    encoder_decoding: 4
    gearbox_ratio: 1.0

    # approx_rear_diff = rear encoders only; full_mecanum_4enc = all 4 wired
    odom_model_mode: "approx_rear_diff"

    robot_name: "Robot Savo"
    convention_name: "robot_savo_default"

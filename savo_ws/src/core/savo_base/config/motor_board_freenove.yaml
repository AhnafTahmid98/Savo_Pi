
/base_driver_node:
  ros__parameters:

    # -------------------------------------------------------------------------
    # Backend selection
    # -------------------------------------------------------------------------
    board_backend: "freenove"
    board_name: "robot_savo_freenove_mecanum"
    dryrun: false

    # -------------------------------------------------------------------------
    # PCA9685 / I2C (Robot Savo locked hardware defaults)
    # -------------------------------------------------------------------------
    i2c_bus: 1
    pca9685_addr: 64
    pwm_freq_hz: 50.0

    # Direction-change protection delay (matches your proven teleop behavior)
    quench_ms: 18

    # -------------------------------------------------------------------------
    # PWM / output range
    # -------------------------------------------------------------------------
    # PCA9685 raw range is 0..4095; Robot Savo uses 3500 with safety margin.
    max_duty: 3500

    # -------------------------------------------------------------------------
    # Freenove board motor channel mapping
    # FL:(0,1)  RL:(3,2)  FR:(6,7)  RR:(4,5)
    # -------------------------------------------------------------------------
    fl_ch_a: 0
    fl_ch_b: 1

    rl_ch_a: 3
    rl_ch_b: 2

    fr_ch_a: 6
    fr_ch_b: 7

    rr_ch_a: 4
    rr_ch_b: 5

    # -------------------------------------------------------------------------
    # Per-wheel inversion flags
    # -------------------------------------------------------------------------
    # Robot Savo locked motor polarity.
    invert_fl: true
    invert_rl: true
    invert_fr: true
    invert_rr: true

    # -------------------------------------------------------------------------
    # Backend diagnostics / init behavior
    # -------------------------------------------------------------------------
    board_init_retry_count: 1
    board_init_retry_delay_s: 0.5
    board_log_writes: false
    board_fail_safe_stop_on_error: true

# Software-only validation — no I2C hardware, no motor output.
# max_duty=0 is intentional: motor-off guarantee even if dryrun path is bypassed.

 /base_driver_node:
  ros__parameters:

    cmd_topic: "/cmd_vel_safe"
    safety_stop_topic: "/safety/stop"
    slowdown_topic: "/safety/slowdown_factor"
    watchdog_state_topic: "/savo_base/watchdog_state"
    base_state_topic: "/savo_base/base_state"

    use_safety_stop: true
    use_slowdown_factor: true

    slowdown_default: 1.0
    slowdown_min: 0.0
    slowdown_max: 1.0

    loop_hz: 20.0
    watchdog_timeout_s: 0.25
    publish_status_hz: 2.0

    vx_limit: 0.50
    vy_limit: 0.50
    wz_limit: 0.50

    # motor-off guarantee — see file header
    max_duty: 0
    turn_gain: 1.0

    forward_sign: -1
    strafe_sign: 1
    rotate_sign: 1

    board_backend: "dryrun"
    board_name: "robot_savo_freenove_mecanum_dryrun_motoroff"
    dryrun: true

    # kept for layered YAML compatibility — unused by dryrun backend
    i2c_bus: 1
    pca9685_addr: "0x40"
    pwm_freq_hz: 50.0
    quench_ms: 18

    invert_fl: false
    invert_rl: false
    invert_fr: false
    invert_rr: false
# Conservative bench test profile — robot lifted, validates watchdog + PWM path at low duty.

/base_driver_node:
  ros__parameters:

    cmd_topic: "/cmd_vel_safe"
    safety_stop_topic: "/safety/stop"
    slowdown_topic: "/safety/slowdown_factor"
    watchdog_state_topic: "/savo_base/watchdog_state"
    base_state_topic: "/savo_base/base_state"

    use_safety_stop: true
    use_slowdown_factor: true

    slowdown_default: 1.0
    slowdown_min: 0.0
    slowdown_max: 1.0

    # lower rate is easier to observe on bench
    loop_hz: 20.0
    # tighter than production so stale commands trip faster during testing
    watchdog_timeout_s: 0.25
    publish_status_hz: 2.0

    vx_limit: 0.35
    vy_limit: 0.30
    wz_limit: 0.30

    # 1200 = conservative bench cap; PCA9685 max is 4095
    max_duty: 1200
    enable_breakaway_compensation: false
    min_motion_duty: 0
    breakaway_trigger_duty: 0
    turn_gain: 1.0

    forward_sign: -1
    strafe_sign: -1
    rotate_sign: -1

    # "auto" uses real backend; "dryrun" for no-hardware execution
    board_backend: "auto"
    board_name: "robot_savo_freenove_mecanum"
    dryrun: false

    i2c_bus: 1
    pca9685_addr: "0x40"
    pwm_freq_hz: 50.0
    quench_ms: 18

    # change only after wheel direction test confirms a wiring reversal
    invert_fl: true
    invert_rl: true
    invert_fr: true
    invert_rr: true

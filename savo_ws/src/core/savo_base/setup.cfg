# ROS 2 expects Python executables under install/<pkg>/lib/<pkg>.

[develop]
script_dir=$base/lib/savo_base

[install]
install_scripts=$base/lib/savo_base

[flake8]
max-line-length = 120
extend-ignore =
    A003,
    C408,
    D100,
    D101,
    D102,
    D103,
    D104,
    D105,
    D106,
    D107,
    D200,
    D202,
    D204,
    D205,
    D400,
    D401,
    D402,
    D403,
    Q000,
    Q001,
    Q002,
    I100,
    I101,
    I201,
    I202,
    E131,
    E203,
    E302,
    E501

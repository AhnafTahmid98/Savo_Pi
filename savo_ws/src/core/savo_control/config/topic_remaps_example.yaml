# Reference only. Runtime topic constants are owned by include/savo_control/topic_names.hpp.

topic_contract:
  command_chain:
    manual_source: "/cmd_vel_manual"
    auto_source: "/cmd_vel_auto"
    nav_source: "/cmd_vel_nav"
    recovery_source: "/cmd_vel_recovery"
    mux_output: "/cmd_vel_mux"
    shaped_output: "/cmd_vel"
    safety_output: "/cmd_vel_safe"
    base_input: "/cmd_vel_safe"

  rule:
    base_driver_only_reads: "/cmd_vel_safe"
    nav2_cmd_vel_must_remap_to: "/cmd_vel_nav"


manual_mapping:
  mode: "MANUAL"
  source_topic: "/cmd_vel_manual"

  required_topics:
    - "/cmd_vel_manual"
    - "/cmd_vel_mux"
    - "/cmd_vel"
    - "/cmd_vel_safe"
    - "/safety/stop"


autonomous_mapping:
  mode: "AUTO"
  source_topic: "/cmd_vel_auto"

  producers:
    velocity_test_pattern_node: "/cmd_vel_auto"
    distance_approach_node: "/cmd_vel_auto"
    distance_pid_test_node: "/cmd_vel_auto"
    rotate_to_heading_node: "/cmd_vel_auto"

  required_topics:
    - "/cmd_vel_auto"
    - "/cmd_vel_mux"
    - "/cmd_vel"
    - "/cmd_vel_safe"
    - "/depth/min_front_m"


navigation:
  mode: "NAV"
  nav2_output_remap:
    from: "/cmd_vel"
    to: "/cmd_vel_nav"

  required_topics:
    - "/cmd_vel_nav"
    - "/cmd_vel_mux"
    - "/cmd_vel"
    - "/cmd_vel_safe"
    - "/odometry/filtered"
    - "/scan"


recovery:
  mode: "RECOVERY"
  source_topic: "/cmd_vel_recovery"

  producers:
    recovery_manager_node: "/cmd_vel_recovery"
    backup_escape_node: "/cmd_vel_recovery"

  required_topics:
    - "/cmd_vel_recovery"
    - "/savo_control/recovery_request"
    - "/savo_control/recovery_active"
    - "/savo_control/recovery_state"
    - "/savo_control/recovery_status"
    - "/cmd_vel_mux"
    - "/cmd_vel"
    - "/cmd_vel_safe"
    - "/safety/stop"


mode_control:
  command_topic: "/savo_control/mode_cmd"
  state_topic: "/savo_control/mode_state"

  valid_modes:
    - "STOP"
    - "MANUAL"
    - "AUTO"
    - "NAV"
    - "RECOVERY"


distance_approach:
  production_node: "distance_approach_node"
  fallback_node: "distance_pid_test_node"

  input:
    distance: "/depth/min_front_m"
    safety_stop: "/safety/stop"

  output:
    command: "/cmd_vel_auto"
    status: "/savo_control/distance_approach_status"

  control:
    enable: "/savo_control/distance_approach_enable"
    target: "/savo_control/distance_approach_target"


safety_gate:
  package: "savo_perception"
  input_cmd_vel: "/cmd_vel"
  output_cmd_vel_safe: "/cmd_vel_safe"
  safety_stop: "/safety/stop"
  slowdown_factor: "/safety/slowdown_factor"


savo_base:
  package: "savo_base"
  base_driver_input: "/cmd_vel_safe"

  forbidden_direct_inputs:
    - "/cmd_vel_manual"
    - "/cmd_vel_auto"
    - "/cmd_vel_nav"
    - "/cmd_vel_recovery"
    - "/cmd_vel_mux"
    - "/cmd_vel"


localization_inputs:
  odom_filtered: "/odometry/filtered"
  wheel_odom: "/wheel/odom"
  imu_data: "/imu/data"


perception_inputs:
  depth_min_front: "/depth/min_front_m"
  range_front_ultrasonic: "/savo_perception/range/front_ultrasonic_m"
  range_left: "/savo_perception/range/left_m"
  range_right: "/savo_perception/range/right_m"
  scan: "/scan"

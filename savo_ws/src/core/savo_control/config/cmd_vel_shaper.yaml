cmd_vel_shaper_node:
  ros__parameters:
    # Runtime command shaping node:
    # /cmd_vel_mux -> /cmd_vel
    #
    # Topic names are owned by the C++ topic contract for now:
    # include/savo_control/topic_names.hpp

    # -------------------------------------------------------------------------
    # Timing
    # -------------------------------------------------------------------------
    publish_rate_hz: 30.0
    input_timeout_sec: 0.35
    zero_on_stale_input: true

    # Optional defensive local stop gate.
    # Main robot safety still happens downstream:
    # /cmd_vel -> safety gate -> /cmd_vel_safe -> savo_base
    use_safety_stop_gate: false
    safety_stop_hold_sec: 0.10

    # -------------------------------------------------------------------------
    # Command limits
    # -------------------------------------------------------------------------
    # vx = linear.x
    # vy = linear.y
    # wz = angular.z
    #
    # Conservative indoor/manual-mapping values for Robot Savo.
    limits:
      vx:
        max_abs: 0.20
        deadband: 0.005
        max_rise_rate: 0.30
        max_fall_rate: 0.55

      vy:
        max_abs: 0.18
        deadband: 0.005
        max_rise_rate: 0.25
        max_fall_rate: 0.45

      wz:
        max_abs: 0.50
        deadband: 0.005
        max_rise_rate: 0.80
        max_fall_rate: 1.20

    # -------------------------------------------------------------------------
    # Limiter timing guard
    # -------------------------------------------------------------------------
    limiter:
      min_dt_sec: 0.001
      max_dt_sec: 0.20

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log:
      stale_warn_throttle_ms: 2000
      debug_throttle_ms: 2000

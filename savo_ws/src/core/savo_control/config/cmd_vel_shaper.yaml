cmd_vel_shaper_node:
  ros__parameters:
    # /cmd_vel_mux -> /cmd_vel
    publish_hz: 30.0
    command_timeout_s: 0.35

    reset_on_timeout: true
    use_decel_when_slowing: true

    # Keep local safety gating off here; the main safety path remains downstream:
    # /cmd_vel -> safety gate -> /cmd_vel_safe -> savo_base.
    safety_stop_forces_zero: false

    max_vx: 0.20
    max_vy: 0.18
    max_wz: 0.50

    deadband_vx: 0.005
    deadband_vy: 0.005
    deadband_wz: 0.005

    max_accel_vx: 0.30
    max_accel_vy: 0.25
    max_accel_wz: 0.80

    max_decel_vx: 0.55
    max_decel_vy: 0.45
    max_decel_wz: 1.20

    min_dt_s: 0.001
    max_dt_s: 0.20

    use_slowdown_factor: true
    slowdown_timeout_s: 0.50
    default_slowdown_factor: 1.0
    min_slowdown_factor: 0.0
    max_slowdown_factor: 1.0

    input_topic: "/cmd_vel_mux"
    output_topic: "/cmd_vel"
    safety_stop_topic: "/safety/stop"
    slowdown_topic: "/safety/slowdown_factor"
    status_topic: "/savo_control/cmd_vel_shaper/status"

twist_mux_node:
  ros__parameters:
    # /cmd_vel_manual, /cmd_vel_auto, /cmd_vel_nav, /cmd_vel_recovery
    #   -> /cmd_vel_mux
    publish_hz: 30.0
    command_timeout_s: 0.35

    zero_on_stale: true

    # Keep local safety gating off here; the main safety path remains downstream:
    # /cmd_vel -> safety gate -> /cmd_vel_safe -> savo_base.
    safety_stop_forces_zero: false

    require_recovery_active_for_recovery_cmd: true

    manual_topic: "/cmd_vel_manual"
    auto_topic: "/cmd_vel_auto"
    nav_topic: "/cmd_vel_nav"
    recovery_topic: "/cmd_vel_recovery"
    cmd_out_topic: "/cmd_vel_mux"

    mode_topic: "/savo_control/mode_state"
    recovery_active_topic: "/savo_control/recovery_active"
    safety_stop_topic: "/safety/stop"

    selected_source_topic: "/savo_control/twist_mux/source"
    status_topic: "/savo_control/twist_mux/status"

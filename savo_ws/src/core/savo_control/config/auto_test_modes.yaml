auto_test_manager_node:
  ros__parameters:
    enabled: true
    auto_start: false

    output_topic: "/cmd_vel_auto"
    mode_cmd_topic: "/savo_control/mode_cmd"
    test_cmd_topic: "/savo_control/auto_test_cmd"
    status_topic: "/savo_control/auto_test_status"
    safety_stop_topic: "/safety/stop"

    request_auto_mode_on_start: true
    required_mode: "AUTO"

    send_stop_before_test: true
    send_stop_after_test: true
    stop_hold_s: 1.0

    publish_hz: 20.0
    max_test_duration_s: 10.0
    require_known_test_name: true
    default_test_name: "forward_slow"

    respect_safety_stop: true
    publish_status: true
    status_hz: 5.0
    log_throttle_s: 2.0
    shutdown_zero_count: 5

    limits:
      max_vx: 0.18
      max_vy: 0.18
      max_wz: 0.45
      low_speed_scale: 0.50

    tests:
      forward_slow:
        type: "constant_twist"
        duration_s: 2.0
        vx: 0.10
        vy: 0.00
        wz: 0.00

      backward_slow:
        type: "constant_twist"
        duration_s: 2.0
        vx: -0.10
        vy: 0.00
        wz: 0.00

      strafe_left_slow:
        type: "constant_twist"
        duration_s: 1.5
        vx: 0.00
        vy: 0.10
        wz: 0.00

      strafe_right_slow:
        type: "constant_twist"
        duration_s: 1.5
        vx: 0.00
        vy: -0.10
        wz: 0.00

      rotate_ccw_slow:
        type: "constant_twist"
        duration_s: 1.5
        vx: 0.00
        vy: 0.00
        wz: 0.25

      rotate_cw_slow:
        type: "constant_twist"
        duration_s: 1.5
        vx: 0.00
        vy: 0.00
        wz: -0.25

      forward_pulse:
        type: "pulse_twist"
        pulses: 3
        active_s: 0.6
        rest_s: 0.8
        vx: 0.10
        vy: 0.00
        wz: 0.00

      rotate_pulse:
        type: "pulse_twist"
        pulses: 3
        active_s: 0.5
        rest_s: 0.8
        vx: 0.00
        vy: 0.00
        wz: 0.25

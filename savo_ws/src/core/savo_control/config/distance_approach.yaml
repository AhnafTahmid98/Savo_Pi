distance_approach_node:
  ros__parameters:
    enabled: true
    auto_start: false

    distance_topic: "/depth/min_front_m"
    cmd_vel_out_topic: "/cmd_vel_auto"
    mode_cmd_topic: "/savo_control/mode_cmd"
    safety_stop_topic: "/safety/stop"
    status_topic: "/savo_control/distance_approach_status"

    enable_topic: "/savo_control/distance_approach_enable"
    target_topic: "/savo_control/distance_approach_target"

    request_auto_mode_on_start: true
    required_mode: "AUTO"
    start_on_target_update: false

    stop_on_goal: true
    stop_if_too_close: true

    target_distance_m: 0.60
    tolerance_m: 0.04
    hold_time_s: 0.40
    hard_min_distance_m: 0.35

    min_valid_distance_m: 0.05
    max_valid_distance_m: 3.00
    distance_timeout_s: 0.40

    smoothing_enabled: true
    smoothing_alpha: 0.45

    kp: 0.45
    ki: 0.00
    kd: 0.03

    integral_limit: 0.15
    integral_active_error_m: 0.20
    derivative_filter_alpha: 0.35

    max_forward_vx: 0.10
    allow_reverse: false
    max_reverse_vx: 0.05

    min_vx_when_active: 0.04
    disable_min_vx_below_error_m: 0.08

    loop_hz: 30.0
    timeout_s: 10.0
    stop_hold_s: 0.50
    shutdown_zero_count: 5

    respect_safety_stop: true
    zero_on_invalid_distance: true
    zero_on_distance_timeout: true

    publish_status: true
    status_hz: 5.0
    log_throttle_s: 2.0



/**:
  ros__parameters:
    publish_rate_hz: 30.0
    update_rate_hz: 20.0
    loop_rate_hz: 20.0

    input_timeout_sec: 0.35
    cmd_timeout_sec: 0.35
    recovery_cmd_timeout_sec: 0.50
    odom_timeout_sec: 0.50
    base_cmd_timeout_sec: 0.35

    # Fail safe when command or odom data becomes stale.
    zero_on_stale_input: true
    zero_on_stale_odom: true
    zero_linear_on_stale_base_cmd: true
    zero_on_unknown_mode: true

    # Main safety remains downstream: /cmd_vel -> safety gate -> /cmd_vel_safe.
    use_safety_stop_gate: false
    safety_stop_hold_sec: 0.10

    default_mode: "STOP"
    startup_mode: "STOP"

    manual_override_preempts_all: true
    recovery_preempts_auto_nav: true
    recovery_preempts_manual: false
    latch_recovery_mode: true
    safety_stop_forces_stop_mode: true
    external_stop_forces_stop_mode: true
    prefer_nav_over_auto: false
    fallback_to_stop_when_source_unavailable: true

    min_time_sec: 0.0
    max_time_jump_sec: 5.0

    manual_source_available_default: true
    auto_source_available_default: true
    nav_source_available_default: true
    recovery_source_available_default: true

    publish_selected_route_topic: true
    selected_route_topic: "/savo_control/selected_cmd_source"

    log_mode_changes: true
    log_request_changes: true

    output:
      vx_max_abs: 0.25
      vy_max_abs: 0.22
      wz_max_abs: 0.60

    limits:
      vx:
        max_abs: 0.25
        deadband: 0.005
        max_rise_rate: 0.35
        max_fall_rate: 0.55

      vy:
        max_abs: 0.22
        deadband: 0.005
        max_rise_rate: 0.30
        max_fall_rate: 0.45

      wz:
        max_abs: 0.60
        deadband: 0.005
        max_rise_rate: 0.90
        max_fall_rate: 1.20

    limiter:
      min_dt_sec: 0.001
      max_dt_sec: 0.20

    timing:
      loop_hz: 20.0
      cmd_safe_timeout_s: 0.40
      odom_timeout_s: 0.50
      safety_timeout_s: 0.50
      stuck_time_s: 2.0
      clear_time_s: 1.0
      retrigger_cooldown_s: 3.0

    diagnostics:
      log_throttle_s: 2.0

    log:
      stale_warn_throttle_ms: 2000
      debug_throttle_ms: 2000

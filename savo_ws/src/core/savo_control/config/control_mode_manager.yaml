control_mode_manager_node:
  ros__parameters:
    # Runtime command authority state machine.
    publish_hz: 20.0

    startup_mode: "STOP"
    fallback_mode: "STOP"

    request_timeout_s: 1.0
    recovery_latch_timeout_s: 2.0
    manual_override_timeout_s: 1.5

    allow_manual: true
    allow_auto: true
    allow_nav: true
    allow_recovery: true

    safety_stop_forces_stop: true
    external_stop_forces_stop: true
    recovery_active_forces_recovery: true

    mode_cmd_topic: "/savo_control/mode_cmd"
    mode_state_topic: "/savo_control/mode_state"
    mode_reason_topic: "/savo_control/mode_reason"
    control_status_topic: "/savo_control/control_status"

    safety_stop_topic: "/safety/stop"
    external_stop_topic: "/savo_control/external_stop"
    recovery_active_topic: "/savo_control/recovery_active"
    manual_override_topic: "/savo_control/manual_override"

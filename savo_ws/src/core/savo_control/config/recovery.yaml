recovery_manager_node:
  ros__parameters:
    topics:
      stuck_detected: "/savo_control/stuck_detected"
      recovery_request: "/savo_control/recovery_request"
      recovery_active: "/savo_control/recovery_active"
      safety_stop: "/safety/stop"
      cmd_vel_recovery: "/cmd_vel_recovery"
      recovery_state: "/savo_control/recovery_state"
      recovery_status: "/savo_control/recovery_status"

      manual_override: ""
      motion_allowed: ""
      no_progress: ""
      backup_completed: ""
      turn_completed: ""

    loop_rate_hz: 30.0
    input_timeout_sec: 0.50

    stale:
      stuck_as_false: true
      no_progress_as_false: true
      safety_stop_as_true: false
      manual_override_as_true: false
      motion_allowed_as_false: false

    policy:
      trigger_confirm_sec: 0.20
      backup_duration_sec: 0.60
      settle_duration_sec: 0.20
      turn_duration_sec: 0.40
      enable_turn_phase: true
      max_recovery_duration_sec: 3.0
      cooldown_sec: 1.0
      max_attempts_per_streak: 3
      reset_attempts_on_progress: true
      min_time_sec: 0.0
      max_time_jump_sec: 5.0

    command:
      # Positive value; node publishes backward motion internally.
      backup_speed_m_s: 0.06
      turn_speed_rad_s: 0.35
      publish_zero_when_idle: true
      publish_zero_on_abort_or_done: true

    completion:
      use_external_backup_completed: false
      use_external_turn_completed: false


backup_escape_node:
  ros__parameters:
    topics:
      trigger: "/savo_control/recovery_request"
      cancel: ""
      safety_stop: "/safety/stop"
      slowdown_factor: "/safety/slowdown_factor"
      cmd_out: "/cmd_vel_recovery"
      state: "/savo_control/recovery_state"
      status: "/savo_control/recovery_status"
      backup_completed: "/savo_control/backup_completed"
      turn_completed: "/savo_control/turn_completed"

    loop_rate_hz: 30.0
    input_timeout_sec: 0.50
    publish_zero_when_idle: true

    behavior:
      backup_duration_sec: 0.50
      settle_duration_sec: 0.20
      turn_duration_sec: 0.35
      enable_turn_phase: true
      auto_reset_after_done: true
      done_hold_sec: 0.20

    command:
      # Positive value; node publishes backward motion internally.
      backup_speed_m_s: 0.05
      turn_speed_rad_s: 0.30
      turn_sign: 1
      respect_slowdown_factor: false
      min_slowdown_factor: 0.20

    trigger:
      rising_edge_only: true
      allow_retrigger_in_active: false

    stale:
      safety_stop_as_true: false
      slowdown_as_one: true


recovery_status_node:
  ros__parameters:
    publish_hz: 2.0
    stale_timeout_s: 0.75
    log_hz: 0.5

    output_status_topic: "/savo_control/recovery_monitor_status"

    cmd_vel_recovery_topic: "/cmd_vel_recovery"
    cmd_vel_safe_topic: "/cmd_vel_safe"

    recovery_status_topic: "/savo_control/recovery_status"
    backup_escape_status_topic: "/savo_control/recovery_status"
    stuck_state_topic: "/savo_control/stuck_state"
    recovery_request_topic: "/savo_control/recovery_request"
    recovery_active_topic: "/savo_control/recovery_active"

    mode_cmd_topic: "/savo_control/mode_cmd"
    mode_state_topic: "/savo_control/mode_state"

    safety_stop_topic: "/safety/stop"
    slowdown_factor_topic: "/safety/slowdown_factor"

    odom_topic: "/odometry/filtered"

    watch_odom: true
    watch_slowdown_factor: true
    publish_console_log: true

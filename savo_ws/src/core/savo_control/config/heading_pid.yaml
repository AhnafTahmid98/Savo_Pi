heading_pid_node:
  ros__parameters:
    odom_topic: "/odometry/filtered"
    base_cmd_topic: "/cmd_vel_raw"
    output_topic: "/cmd_vel_auto"
    heading_target_topic: "/savo_control/heading_target"
    heading_hold_enable_topic: "/savo_control/heading_hold_enable"
    state_topic: "/savo_control/rotate_state"

    publish_rate_hz: 30.0
    odom_timeout_sec: 0.40
    base_cmd_timeout_sec: 0.35

    zero_on_stale_odom: true
    zero_linear_on_stale_base_cmd: true

    enable_linear_passthrough: true
    passthrough_wz_when_disabled: false
    capture_hold_target_on_enable: true
    require_target_or_hold: true
    zero_wz_when_within_tolerance: true

    use_fixed_linear_cmd: false
    fixed_vx_m_s: 0.0
    fixed_vy_m_s: 0.0

    output:
      vx_max_abs: 0.20
      vy_max_abs: 0.18
      wz_max_abs: 0.45

    pid:
      kp: 0.85
      ki: 0.0
      kd: 0.04
      output_min: -0.45
      output_max: 0.45
      integral_clamp: 0.20
      d_filter_alpha: 0.35
      min_dt_sec: 0.001
      max_dt_sec: 0.20
      freeze_integral_on_invalid_dt: true

    # 0.06 rad is about 3.4 degrees.
    heading_tolerance_rad: 0.06

    output_deadband_rad_s: 0.0
    min_effective_wz_rad_s: 0.08
    max_wz_rad_s: 0.45

    reset_pid_on_hold_capture: true
    reset_pid_on_target_change: true
    target_change_reset_threshold_rad: 0.02

    ctrl:
      min_dt_sec: 0.001
      max_dt_sec: 0.20

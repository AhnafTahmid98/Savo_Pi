stuck_detector_node:
  ros__parameters:
    enabled: true
    active_detection: true

    topics:
      cmd_vel_safe: "/cmd_vel_safe"
      odom: "/odometry/filtered"
      safety_stop: "/safety/stop"
      stuck_state: "/savo_control/stuck_state"
      status: "/savo_control/stuck_detector_status"
      recovery_request: "/savo_control/recovery_request"

    timing:
      loop_hz: 20.0
      cmd_safe_timeout_s: 0.40
      odom_timeout_s: 0.50
      safety_timeout_s: 0.50
      stuck_time_s: 2.0
      clear_time_s: 1.0
      retrigger_cooldown_s: 3.0

    command_thresholds:
      min_cmd_safe_vx: 0.05
      min_cmd_safe_vy: 0.05
      min_cmd_safe_wz: 0.12

    observed_motion_thresholds:
      min_linear_speed_m_s: 0.025
      min_strafe_speed_m_s: 0.020
      min_angular_speed_rad_s: 0.06

    detection:
      ignore_when_safety_stop_true: true
      do_not_declare_stuck_on_odom_stale: true
      do_not_declare_stuck_on_cmd_safe_stale: true
      startup_grace_s: 2.0

    recovery:
      # Observe detection first; enable automatic recovery after real tuning.
      publish_recovery_request: false
      min_stuck_time_before_recovery_s: 2.5
      max_recovery_requests_per_event: 1

    output:
      publish_status: true
      status_hz: 5.0
      publish_clear_on_startup: true
      publish_clear_when_unstuck: true

    safety:
      block_recovery_when_safety_stop_true: true
      block_recovery_when_odom_stale: true
      block_recovery_when_cmd_safe_stale: true

    diagnostics:
      log_stuck_detected: true
      log_stuck_cleared: true
      log_throttle_s: 2.0

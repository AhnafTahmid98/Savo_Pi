lidar_driver_node:
  ros__parameters:
    serial_port: "/dev/ttyUSB0"
    baudrate: 115200
    serial_timeout_s: 1.0
    dtr_enable: false
    rts_enable: false

    reconnect_on_error: true
    reconnect_delay_s: 0.5
    max_reconnect_delay_s: 5.0

    frame_id: "laser"
    scan_topic: "/scan"
    scan_mode: "standard"

    driver_state_topic: "/savo_lidar/state"
    heartbeat_topic: "/savo_lidar/heartbeat"

    expected_scan_rate_hz: 5.5
    publish_rate_hz: 7.0
    read_timeout_s: 2.0

    motor_start_settle_s: 1.0
    motor_stop_timeout_s: 1.0

    min_range_m: 0.15
    max_range_m: 12.0

    inverted: false
    angle_offset_rad: 0.0
    auto_start: true

lidar_filter_node:
  ros__parameters:
    input_scan_topic: "/scan"
    output_scan_topic: "/scan_filtered"
    scan_quality_topic: "/savo_lidar/scan_quality"

    min_range_m: 0.15
    max_range_m: 12.0

    warn_valid_ratio: 0.60
    error_valid_ratio: 0.30

lidar_watchdog_node:
  ros__parameters:
    scan_topic: "/scan"
    watchdog_state_topic: "/savo_lidar/watchdog_state"

    stale_timeout_s: 1.0
    publish_hz: 2.0
    warn_before_stale_ratio: 0.75

lidar_health_node:
  ros__parameters:
    state_topic: "/savo_lidar/state"
    watchdog_state_topic: "/savo_lidar/watchdog_state"
    scan_quality_topic: "/savo_lidar/scan_quality"
    health_topic: "/savo_lidar/health"

    publish_hz: 1.0

    min_valid_ratio_warn: 0.60
    min_valid_ratio_error: 0.30
    min_scan_rate_hz: 2.0

lidar_state_publisher_node:
  ros__parameters:
    driver_state_topic: "/savo_lidar/state"
    health_topic: "/savo_lidar/health"
    watchdog_state_topic: "/savo_lidar/watchdog_state"
    summary_topic: "/savo_lidar/state_summary"

    publish_hz: 1.0

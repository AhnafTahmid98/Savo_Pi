# Robot Savo — LiDAR topic contract
#
# This file is intentionally small and stable.
# Node runtime parameters live in lidar_driver.yaml, lidar_filter.yaml,
# lidar_health.yaml, and profile YAML files.

topics:
  scan:
    raw: "/scan"
    filtered: "/scan_filtered"

  state:
    driver: "/savo_lidar/state"
    health: "/savo_lidar/health"
    watchdog: "/savo_lidar/watchdog_state"
    summary: "/savo_lidar/state_summary"
    scan_quality: "/savo_lidar/scan_quality"
    heartbeat: "/savo_lidar/heartbeat"

  sectors:
    front: "/savo_lidar/sector_scan/front"
    left: "/savo_lidar/sector_scan/left"
    right: "/savo_lidar/sector_scan/right"
    back: "/savo_lidar/sector_scan/back"

  downstream:
    mapping_scan: "/scan"
    nav_scan: "/scan"
    safety_scan: "/scan"
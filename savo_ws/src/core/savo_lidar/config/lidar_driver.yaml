lidar_driver_node:
  ros__parameters:
    model: "rplidar_a1"

    # use dryrun on PC; set real on savo-core with the LiDAR connected
    backend: "dryrun"

    scan_topic: "/scan"
    frame_id: "laser"

    serial_port: "/dev/ttyUSB0"
    baudrate: 115200
    scan_mode: "standard"

    serial_timeout_s: 1.0
    reconnect_on_error: true
    reconnect_delay_s: 1.0
    max_reconnect_delay_s: 5.0

    # wait for the A1 motor to stabilize before trusting scan data
    motor_start_settle_s: 2.0
    motor_stop_timeout_s: 1.0

    min_range_m: 0.15
    max_range_m: 12.0

    # A1 usually runs around 5–10 Hz; warn before it becomes unstable for mapping
    expected_scan_rate_hz: 5.5
    min_scan_rate_hz: 3.0
    scan_rate_warn_hz: 4.5

    publish_rate_hz: 10.0
    stale_timeout_s: 1.0

    inverted: false
    angle_compensate: true

    # keep zero unless RViz shows the scan rotated from the robot frame
    angle_offset_deg: 0.0

    require_valid_scan: true
    min_valid_points: 120
    max_allowed_inf_ratio: 0.70
    max_allowed_nan_ratio: 0.05

    publish_driver_state: true
    driver_state_topic: "/savo_lidar/state"
    heartbeat_topic: "/savo_lidar/heartbeat"
    heartbeat_hz: 1.0

    log_scan_summary: false
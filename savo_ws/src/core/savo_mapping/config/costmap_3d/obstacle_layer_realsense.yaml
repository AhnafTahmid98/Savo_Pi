obstacle_layer_realsense:
  ros__parameters:
    plugin: nav2_costmap_2d::ObstacleLayer
    enabled: true

    observation_sources: realsense_points

    realsense_points:
      topic: /savo_edge/realsense/points
      data_type: PointCloud2

      marking: true
      clearing: true

      min_obstacle_height: 0.05
      max_obstacle_height: 1.50

      obstacle_min_range: 0.10
      obstacle_max_range: 2.00

      raytrace_min_range: 0.10
      raytrace_max_range: 2.50

      expected_update_rate: 0.0
      observation_persistence: 0.0
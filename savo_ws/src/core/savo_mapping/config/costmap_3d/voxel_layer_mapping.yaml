voxel_layer:
  ros__parameters:
    plugin: nav2_costmap_2d::VoxelLayer
    enabled: true

    observation_sources: realsense_points

    publish_voxel_map: false
    origin_z: 0.0
    z_resolution: 0.05
    z_voxels: 16
    mark_threshold: 0

    max_obstacle_height: 1.50
    unknown_threshold: 15

    realsense_points:
      topic: /savo_edge/realsense/points
      data_type: PointCloud2

      marking: true
      clearing: true

      min_obstacle_height: 0.05
      max_obstacle_height: 1.50

      obstacle_min_range: 0.10
      obstacle_max_range: 2.00

      raytrace_min_range: 0.10
      raytrace_max_range: 2.50

      expected_update_rate: 0.0
      observation_persistence: 0.0
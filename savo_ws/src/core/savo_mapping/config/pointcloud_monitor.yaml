pointcloud_monitor_node:
  ros__parameters:
    enabled: false

    pointcloud_topic: /savo_edge/realsense/points
    status_topic: /savo_mapping/pointcloud_status
    expected_frame: camera_depth_optical_frame

    publish_rate_hz: 5.0
    min_rate_hz: 3.0
    min_points: 100
    stale_timeout_s: 1.0

    verbose_status_log: false
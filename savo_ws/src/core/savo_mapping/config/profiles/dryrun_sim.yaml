profile:
  name: dryrun_sim
  description: Dry-run simulation profile for Robot Savo mapping nodes.

mapping_supervisor_node:
  ros__parameters:
    mode: manual_mapping
    map_name: dryrun_sim

    scan_topic: /scan
    odom_topic: /odometry/filtered
    map_topic: /map
    pointcloud_topic: /savo_edge/realsense/points

    require_scan: false
    require_odom: false
    require_tf: false
    require_map: false
    require_pointcloud: false

    publish_semantic_status: true
    semantic_store_path: maps/semantic/semantic_landmarks.json
    known_locations_path: maps/semantic/known_locations.json

    publish_exploration_status: true
    exploration_strategy: frontier

    verbose_status_log: true

mapping_mode_manager_node:
  ros__parameters:
    default_mode: idle
    map_name: dryrun_sim

    allow_idle: true
    allow_manual_mapping: true
    allow_autonomous_mapping: true
    allow_map_saving: true
    allow_semantic_review: true

    verbose_status_log: true

mapping_dashboard_node:
  ros__parameters:
    verbose_status_log: true

frontier_explorer_node:
  ros__parameters:
    enabled: true
    require_odom: false
    publish_repeated_goal: true
    verbose_status_log: true

pointcloud_monitor_node:
  ros__parameters:
    enabled: false

apriltag_mapper_node:
  ros__parameters:
    enabled: true
    tag_database_path: maps/semantic/tag_database.json
    semantic_store_path: maps/semantic/semantic_landmarks.json
    allow_unknown_tags: true
    require_tag_database: false
    require_semantic_store_path: false
    verbose_status_log: true

location_bridge_node:
  ros__parameters:
    enabled: true
    semantic_store_path: maps/semantic/semantic_landmarks.json
    known_locations_path: maps/semantic/known_locations.json
    write_known_locations: true
    require_semantic_store: false
    verbose_status_log: true

location_confirmation_node:
  ros__parameters:
    enabled: true
    semantic_store_path: maps/semantic/semantic_landmarks.json
    require_semantic_store: false
    verbose_status_log: true

semantic_landmark_recorder_node:
  ros__parameters:
    enabled: true
    semantic_store_path: maps/semantic/semantic_landmarks.json
    default_confirm: false
    require_semantic_store_path: false
    verbose_status_log: true

map_event_logger_node:
  ros__parameters:
    enabled: true
    log_path: maps/events/dryrun_sim_events.jsonl
    publish_logged_event: true
    verbose_status_log: true
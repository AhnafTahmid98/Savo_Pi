profile:
  name: bench_lidar_only
  description: LiDAR-only bench mapping profile for Robot Savo.

mapping_supervisor_node:
  ros__parameters:
    mode: manual_mapping
    map_name: bench_lidar_only

    scan_topic: /scan
    odom_topic: /odometry/filtered
    map_topic: /map
    pointcloud_topic: /savo_edge/realsense/points

    require_scan: true
    require_odom: false
    require_tf: false
    require_map: false
    require_pointcloud: false

    min_scan_rate_hz: 3.0
    scan_stale_timeout_s: 1.0
    publish_semantic_status: false
    publish_exploration_status: false
    verbose_status_log: true

mapping_mode_manager_node:
  ros__parameters:
    default_mode: manual_mapping
    map_name: bench_lidar_only

    allow_idle: true
    allow_manual_mapping: true
    allow_autonomous_mapping: false
    allow_map_saving: false
    allow_semantic_review: false

mapping_dashboard_node:
  ros__parameters:
    verbose_status_log: true

frontier_explorer_node:
  ros__parameters:
    enabled: false
    require_odom: false

pointcloud_monitor_node:
  ros__parameters:
    enabled: false

apriltag_mapper_node:
  ros__parameters:
    enabled: false

location_bridge_node:
  ros__parameters:
    enabled: false

location_confirmation_node:
  ros__parameters:
    enabled: false

semantic_landmark_recorder_node:
  ros__parameters:
    enabled: false

map_event_logger_node:
  ros__parameters:
    enabled: true
    log_path: maps/events/bench_lidar_only_events.jsonl
frames:
  global:
    map: map
    odom: odom
    base_link: base_link

  sensors:
    laser: laser
    camera_depth: camera_depth_optical_frame
    camera_color: camera_color_optical_frame
    realsense_link: camera_link
    apriltag: tag

  tf_edges:
    map_to_odom:
      parent: map
      child: odom
      required: true

    odom_to_base:
      parent: odom
      child: base_link
      required: true

    base_to_laser:
      parent: base_link
      child: laser
      required: true

    base_to_camera:
      parent: base_link
      child: camera_link
      required: false

  mapping:
    default_map_frame: map
    default_goal_frame: map
    default_odom_frame: odom
    default_base_frame: base_link
    default_laser_frame: laser
slam_toolbox:
  ros__parameters:
    solver_plugin: "solver_plugins::CeresSolver"
    ceres_linear_solver: "SPARSE_NORMAL_CHOLESKY"
    ceres_preconditioner: "SCHUR_JACOBI"
    ceres_trust_strategy: "LEVENBERG_MARQUARDT"
    ceres_dogleg_type: "TRADITIONAL_DOGLEG"
    ceres_loss_function: "HuberLoss"

    mode: "mapping"

    map_frame: "map"
    odom_frame: "odom"
    base_frame: "base_link"
    scan_topic: "/scan"

    use_map_saver: true
    debug_logging: false

    throttle_scans: 1
    scan_queue_size: 1

    transform_publish_period: 0.05
    map_update_interval: 2.0

    resolution: 0.05

    restamp_tf: false

    min_laser_range: 0.15
    max_laser_range: 12.0

    minimum_time_interval: 0.25
    transform_timeout: 0.20
    tf_buffer_duration: 30.0

    stack_size_to_use: 40000000
    enable_interactive_mode: false

    use_scan_matching: true
    use_scan_barycenter: true

    minimum_travel_distance: 0.10
    minimum_travel_heading: 0.10
    check_min_dist_and_heading_precisely: false

    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0

    link_match_minimum_response_fine: 0.10
    link_scan_maximum_distance: 1.50

    loop_search_maximum_distance: 3.00
    do_loop_closing: true

    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.00
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    correlation_search_space_dimension: 0.50
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.10

    loop_search_space_dimension: 8.00
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    distance_variance_penalty: 0.50
    angle_variance_penalty: 1.00

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349

    minimum_angle_penalty: 0.90
    minimum_distance_penalty: 0.50

    use_response_expansion: true
    min_pass_through: 2
    occupancy_threshold: 0.10

velocity_smoother:
  ros__parameters:
    use_sim_time: false

    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: OPEN_LOOP

    max_velocity: [0.18, 0.18, 0.45]
    min_velocity: [-0.12, -0.12, -0.45]

    max_accel: [0.35, 0.35, 0.80]
    max_decel: [-0.45, -0.45, -1.00]

    deadband_velocity: [0.0, 0.0, 0.0]

    velocity_timeout: 1.0
    odom_topic: /odometry/filtered
    odom_duration: 0.1

    robot_savo_policy:
      holonomic_base: true
      mecanum_drive: true
      smooth_nav2_cmd_vel: true
      output_must_pass_safety_gate: true
      nav2_cmd_vel_topic: /cmd_vel
      safe_cmd_vel_topic: /cmd_vel_safe
      never_bypass_cmd_vel_safe: true
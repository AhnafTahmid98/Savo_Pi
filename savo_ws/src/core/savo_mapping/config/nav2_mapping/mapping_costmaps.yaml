mapping_costmaps:
  ros__parameters:
    use_sim_time: false

    frames:
      map_frame: map
      odom_frame: odom
      base_frame: base_link

    robot:
      robot_radius: 0.22
      footprint_padding: 0.03

    lidar:
      enabled: true
      topic: /scan
      data_type: LaserScan
      obstacle_min_range: 0.10
      obstacle_max_range: 3.00
      raytrace_min_range: 0.10
      raytrace_max_range: 4.00
      max_obstacle_height: 1.50

    realsense:
      enabled: false
      topic: /savo_edge/realsense/points
      data_type: PointCloud2
      obstacle_min_range: 0.10
      obstacle_max_range: 2.00
      raytrace_min_range: 0.10
      raytrace_max_range: 2.50
      min_obstacle_height: 0.05
      max_obstacle_height: 1.50

    local_costmap:
      global_frame: odom
      rolling_window: true
      width: 3.0
      height: 3.0
      resolution: 0.05
      update_frequency: 5.0
      publish_frequency: 2.0
      inflation_radius: 0.35
      cost_scaling_factor: 3.0

    global_costmap:
      global_frame: map
      rolling_window: false
      resolution: 0.05
      update_frequency: 2.0
      publish_frequency: 1.0
      track_unknown_space: true
      inflation_radius: 0.45
      cost_scaling_factor: 3.0

    mapping_policy:
      lidar_is_primary: true
      realsense_is_assist: true
      tof_ultrasonic_in_costmap: false
      safety_stack_is_final_authority: true
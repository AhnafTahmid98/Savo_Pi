nav2_recovery:
  ros__parameters:
    use_sim_time: false

    behavior_server:
      cycle_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 0.20

      simulate_ahead_time: 2.0
      max_rotational_vel: 0.45
      min_rotational_vel: 0.10
      rotational_acc_lim: 0.80

      behavior_plugins:
        - wait
        - backup
        - spin
        - drive_on_heading

      wait:
        plugin: nav2_behaviors::Wait
        enabled: true

      backup:
        plugin: nav2_behaviors::BackUp
        enabled: true

      spin:
        plugin: nav2_behaviors::Spin
        enabled: true

      drive_on_heading:
        plugin: nav2_behaviors::DriveOnHeading
        enabled: true

    robot_savo_policy:
      recovery_enabled: true
      allow_wait: true
      allow_backup: true
      allow_spin: true
      allow_drive_on_heading: false

      backup_distance_m: 0.20
      backup_speed_mps: 0.05
      wait_duration_s: 2.0
      max_recovery_attempts: 2

      stop_if_safety_stop_true: true
      movement_must_pass_safety_gate: true
      never_bypass_cmd_vel_safe: true
exploration_nav2:
  ros__parameters:
    use_sim_time: false

    enabled: false
    mode: goal_publish_only

    input:
      exploration_status_topic: /savo_mapping/exploration_status
      selected_goal_topic: /savo_mapping/exploration/goal
      selected_goal_pose_topic: /savo_mapping/exploration/goal_pose
      fallback_frontier_goal_topic: /savo_mapping/frontier_explorer/goal
      fallback_frontier_goal_pose_topic: /savo_mapping/frontier_explorer/goal_pose
      safety_stop_topic: /safety/stop
      mapping_status_topic: /savo_mapping/status

    strategy_policy:
      active_strategy: frontier
      supported_strategies:
        - frontier
        - coverage
        - waypoint
        - area
        - semantic

      allow_frontier: true
      allow_coverage: true
      allow_waypoint: true
      allow_area: true
      allow_semantic: true

      fallback_to_frontier_topics: true

    nav2:
      action_name: /navigate_to_pose
      global_frame: map
      robot_base_frame: base_link
      odom_topic: /odometry/filtered

    goal_policy:
      require_mapping_ready: true
      require_fresh_goal: true
      goal_stale_timeout_s: 5.0

      min_goal_distance_m: 0.30
      max_goal_distance_m: 8.00
      goal_tolerance_xy_m: 0.25
      goal_tolerance_yaw_rad: 0.35

      reject_goal_if_safety_stop: true
      reject_repeated_goal: true
      reject_unknown_strategy: true

    timing:
      publish_rate_hz: 2.0
      nav2_server_timeout_s: 5.0
      goal_result_timeout_s: 60.0
      retry_delay_s: 2.0

    recovery:
      max_goal_retries: 2
      blacklist_failed_goals: true
      blacklist_radius_m: 0.60
      blacklist_ttl_s: 300.0

    robot_savo_policy:
      movement_authority_package: savo_nav
      mapping_selects_goals_only: true
      nav2_sends_cmd_vel: true
      safety_gate_required: true
      cmd_vel_output: /cmd_vel
      safe_cmd_vel_output: /cmd_vel_safe
      never_bypass_cmd_vel_safe: true

    verbose_status_log: false
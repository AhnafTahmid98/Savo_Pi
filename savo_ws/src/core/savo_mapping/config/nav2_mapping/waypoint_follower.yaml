waypoint_follower:
  ros__parameters:
    use_sim_time: false

    loop_rate: 20
    stop_on_failure: true

    waypoint_task_executor_plugin: wait_at_waypoint

    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 0

    robot_savo_policy:
      use_for_mapping: true
      use_for_semantic_waypoints: true
      movement_must_pass_safety_gate: true
map_saver:
  ros__parameters:
    use_sim_time: false

    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

    map_topic: /map
    map_metadata_topic: /map_metadata

    default_map_url: maps/saved/robot_savo_default
    image_format: pgm
    map_mode: trinary
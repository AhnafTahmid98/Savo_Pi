
twist_mux_node:
  ros__parameters:

    # -------------------------------------------------------------------------
    # Topic configuration
    # -------------------------------------------------------------------------

    # Input command sources
    topics:
      manual: "/cmd_vel_manual"
      auto: "/cmd_vel_auto"
      nav: "/cmd_vel_nav"
      recovery: "/cmd_vel_recovery"

      # Selected output from this node
      output: "/cmd_vel_mux"

      # future: switch to /savo_control/mode_state once mode_manager is wired up
      mode: "/savo_control/mode_cmd"

      # Optional status output from mux
      status: "/savo_control/twist_mux_status"

    # -------------------------------------------------------------------------
    # Default control mode
    # -------------------------------------------------------------------------
    default_mode: "STOP"

    # If true, publish zero Twist when mode is STOP or when active source is stale.
    publish_zero_on_stop: true

    # Publish zero Twist immediately when switching mode.
    stop_on_mode_change: true

    # How long to hold zero after a mode change before accepting new commands.
    mode_change_stop_hold_s: 0.20

    # -------------------------------------------------------------------------
    # Input timeout / stale protection
    # -------------------------------------------------------------------------
    #
    # 0.35s — slightly softer than savo_base watchdog so base trips last
    source_timeout_s: 0.35

    # Timer loop rate for checking stale commands and publishing output.
    loop_hz: 30.0

    # -------------------------------------------------------------------------
    # priority: recovery > manual > nav > auto
    # -------------------------------------------------------------------------
    priority:
      recovery: 100
      manual: 80
      nav: 60
      auto: 40

    # recovery can interrupt any mode — handled before priority check
    recovery_override_enabled: true

    manual_override_enabled: true

    # -------------------------------------------------------------------------
    # per-source limits (extra clamp before cmd_vel_shaper)
    # -------------------------------------------------------------------------
    source_limits:
      manual:
        max_vx: 0.25
        max_vy: 0.25
        max_wz: 0.60

      nav:
        max_vx: 0.22
        max_vy: 0.18
        max_wz: 0.50

      auto:
        max_vx: 0.18
        max_vy: 0.18
        max_wz: 0.45

      recovery:
        max_vx: 0.12
        max_vy: 0.00
        max_wz: 0.35

    # -------------------------------------------------------------------------
    # Manual mapping profile
    # -------------------------------------------------------------------------
    #
    # Used by teleop_control.launch.py or manual_mapping bringup.
    manual_mapping:
      recommended_mode: "MANUAL"
      recommended_input_topic: "/cmd_vel_manual"
      recommended_output_topic: "/cmd_vel_mux"

      # Conservative speed for mapping corridors.
      slow_vx: 0.12
      slow_vy: 0.12
      slow_wz: 0.35

      # Slightly faster but still safe on open floor.
      normal_vx: 0.20
      normal_vy: 0.18
      normal_wz: 0.50
stt_node:
  ros__parameters:

    # small.en is the Pi 5 CPU/int8 quality-speed baseline.
    model_size_or_path: "small.en"

    device: "cpu"

    # int8 keeps faster-whisper practical on ARM CPU.
    compute_type: "int8"

    language: "en"

    # 3 is the current quality/latency balance on Pi.
    beam_size: 3

    sample_rate: 16000

    # Short enough for low latency, long enough for stable VAD.
    block_duration_s: 2.0

    # Hallway idle noise was about 0.00016; 0.0003 still catches soft speech.
    energy_threshold: 0.0003

    # Keeps noise fragments out while allowing "stop" and "status".
    min_transcript_chars: 3

    # ReSpeaker 4 Mic Array is device 0 on this Pi.
    input_device_index: 0

    # Buffering whole utterances avoids partial/duplicated sentences.
    utterance_mode: true

    max_utterance_duration_s: 15.0

    # Prevents Robot Savo from transcribing its own speaker output.
    tts_gate_enable: true
    tts_speaking_topic: "/savo_speech/tts_speaking"
    tts_gate_cooldown_s: 0.8

    publish_topic: "/savo_speech/stt_text"

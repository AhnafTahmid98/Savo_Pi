wake_word_service:
  ros__parameters:
    enabled: false
    backend: openwakeword

    device: cpu
    sample_rate_hz: 16000
    frame_ms: 20

    model_root: runtime/models/wake/openwakeword
    model_names: []

    wake_phrases:
      - hey savo
      - hi savo
      - savo

    detection.threshold: 0.50
    detection.cooldown_s: 2.0
    detection.max_pending_frames: 4

    worker_count: 1
    preload_model: false

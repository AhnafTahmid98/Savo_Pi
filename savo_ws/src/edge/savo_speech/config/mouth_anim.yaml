mouth_anim_node:
  ros__parameters:

    # PCM mode follows actual TTS audio; activity mode is only a fallback.
    mode: "pcm"

    pcm_topic: "/savo_speech/tts_pcm"

    # Must match TARGET_PLAYBACK_SR in tts_node.py.
    pcm_sample_rate: 16000.0

    # 40 ms is smooth without feeling late.
    window_duration_s: 0.04

    # Tuned against Piper PCM amplitude, not microphone input.
    rms_floor: 0.02
    rms_ceiling: 0.30

    activity_topic: "/savo_speech/mouth_open"

    output_topic: "/savo_ui/mouth_level"

    # 30 Hz is smooth enough for the face UI without wasting CPU.
    update_rate_hz: 30.0

    # Snappy open, slower close avoids chatter.
    attack_gain: 0.5
    decay_gain: 0.15

    # Prevent tiny noise wiggles on the display.
    min_level: 0.05

    max_level: 1.0

    debug_logging: false

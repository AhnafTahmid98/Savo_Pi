local_stt_service:
  ros__parameters:
    enabled: false
    backend: faster_whisper

    model_root: runtime/models/stt/faster-whisper
    model_id: base

    device: cpu
    compute_type: int8
    cpu_threads: 4
    worker_count: 1
    preload_model: false

    language: ""
    beam_size: 1
    vad_filter: false

    max_audio_duration_s: 20.0

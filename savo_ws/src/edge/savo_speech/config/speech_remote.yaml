remote_speech_client_node:
  ros__parameters:

    # Empty uses SPEECH_SERVER_URL from env_robot_server.sh.
    speech_server_url: ""

    robot_id: "robot_savo_pi"

    sample_rate_hz: 16000

    chunk_duration_s: 2.0

    # Hallway baseline; low enough for soft speech at normal distance.
    energy_threshold: 0.0003

    # ReSpeaker 4 Mic Array is device 0 on this Pi.
    input_device_index: 0

    # Full-utterance requests avoid duplicate partial answers.
    utterance_mode: true

    max_utterance_duration_s: 15.0

    request_timeout_s: 20.0

    max_retries: 2

    wake_word_enable: true

    # Substring matching on lowercase transcripts; include common ASR variants.
    wake_words:
      - "savo"
      - "sabo"
      - "robo"
      - "robot"
      - "k-robo"
      - "krobo"
      - "k robo"
      - "savu"
      - "sabu"

      - "hey robo"
      - "hey robot"
      - "hey savo"
      - "hey sabo"
      - "hi robo"
      - "hi robot"
      - "hi savo"
      - "hi sabo"
      - "hello robo"
      - "hello robot"
      - "hello savo"

      - "hei robo"
      - "hei robot"
      - "hei savo"
      - "hei sabo"
      - "hei robot savo"
      - "hei robo savo"

      - "robot savo"
      - "robot sabo"
      - "robo savo"
      - "robo sabo"
      - "hey robot savo"
      - "hey robo savo"
      - "hi robot savo"
      - "hi robo savo"
      - "hello robot savo"
      - "hello robo savo"

      - "savonia robot"
      - "hey savonia robot"
      - "hei savonia robot"

    sleep_phrases:
      - "go to sleep"
      - "you can rest"
      - "that is all"
      - "that's all"
      - "kiitos"
      - "bye"
      - "goodbye"
      - "see you later"
      - "see ya"
      - "talk to you later"
      - "i am done"
      - "i'm done"
      - "stop listening"
      - "thanks robot"
      - "bye robot"
      - "goodbye robot"
      - "see you later robot"
      - "see ya robot"
      - "talk to you later robot"
      - "i am done robot"
      - "i'm done robot"
      - "stop listening robot"
      - "bye bye"


    # Countdown starts after TTS finishes.
    awake_idle_timeout_s: 30.0

    # Prevents the mic from feeding Piper output back into /speech.
    tts_gate_enable: true

    tts_speaking_topic: "/savo_speech/tts_speaking"

    tts_gate_cooldown_s: 0.8

    face_state_topic: "/savo_ui/face_state"

    idle_sleep_s: 0.1

    min_transcript_chars: 3

    debug_logging: false

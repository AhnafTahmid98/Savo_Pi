savomind_bridge_node:
  ros__parameters:
    enabled: false

    base_url: http://127.0.0.1:8000
    provider_policy: online_first
    allow_local_fallback: true

    source: mic
    default_language: ""

    timeout.connect_s: 2.0
    timeout.stt_s: 25.0
    timeout.chat_s: 35.0
    timeout.tts_s: 25.0

    retry.max_attempts: 1
    retry.backoff_s: 0.50

    session.require_matching_id: true

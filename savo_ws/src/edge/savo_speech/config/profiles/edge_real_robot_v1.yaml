savo_speech_node:
  ros__parameters:
    enabled: true

    profile: "edge_real_robot_v1"
    robot_id: "robot-savo"
    host_role: "edge"
    device_id: "savo-edge"

    audio:
      required: true

      # Stable ALSA PCM aliases. These must resolve to the ReSpeaker
      # through the edge host's ALSA configuration.
      capture_device: "savo_respeaker"
      playback_device: "savo_respeaker"

      # Numeric USB card indexes are intentionally forbidden because
      # ALSA card numbers can change after reboot or USB re-enumeration.
      allow_numeric_device_fallback: false

      require_exact_sample_rate: true
      sample_rate_hz: 16000

      # ReSpeaker USB capture exposes six interleaved channels.
      capture_channels: 6
      selected_channel: 0

      # SavoMind TTS playback is normalized to mono PCM.
      playback_channels: 1

      period_frames: 320
      periods: 4
      chunk_frames: 320

      pre_roll_ms: 1000
      post_playback_hold_ms: 250

      capture_queue_capacity_frames: 100
      playback_queue_capacity: 8

      processing:
        wait_timeout_ms: 100
        freshness_timeout_ms: 1000
        fault_on_processor_error: true

    wake_word:
      enabled: true
      required: true

      # Keep the safer phrase set for production. The extended profile
      # will be selected explicitly during PC alias testing.
      profile: "default"

      acoustic_model_path: "/usr/share/pocketsphinx/model/en-us/en-us"

      # Empty values select assets installed with the ROS package.
      dictionary_path: ""
      keyword_file_path: ""

      search_name: "savo_wake_words"
      suppress_decoder_log: true

      # PocketSphinx keyword-file thresholds perform the principal
      # phrase acceptance. This remains available for future backends.
      confidence_threshold: 0.65

      required_consecutive_detections: 1
      cooldown_ms: 2000
      event_queue_capacity: 8

    diagnostics:
      status_publish_rate_hz: 2.0
      heartbeat_rate_hz: 1.0

schema_version: 1
profile: robot_savo_full_hybrid
description: Final online-first speech runtime with local STT and TTS fallback.

overrides:
  respeaker_audio_node:
    enabled: true
    backend: alsa

  speech_manager_node:
    enabled: true
    start_awake: false

  wake_word_service:
    enabled: true
    preload_model: true

  local_stt_service:
    enabled: true
    preload_model: true

  local_tts_service:
    enabled: true
    preload_model: true

  savomind_bridge_node:
    enabled: true
    provider_policy: online_first
    allow_local_fallback: true

schema_version: 1
profile: dryrun_no_hardware
description: PC-safe speech contract and state-machine development without audio hardware.

overrides:
  respeaker_audio_node:
    enabled: true
    backend: dryrun
    dryrun.capture_enabled: true
    dryrun.playback_enabled: true

  speech_manager_node:
    enabled: true
    start_awake: false

  wake_word_service:
    enabled: false

  local_stt_service:
    enabled: false

  local_tts_service:
    enabled: false

  savomind_bridge_node:
    enabled: false

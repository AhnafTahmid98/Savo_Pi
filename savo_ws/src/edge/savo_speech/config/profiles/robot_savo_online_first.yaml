schema_version: 1
profile: robot_savo_online_first
description: Real Robot Savo speech hardware with online-first SavoMind providers.

overrides:
  respeaker_audio_node:
    enabled: true
    backend: alsa

  speech_manager_node:
    enabled: true
    start_awake: false

  wake_word_service:
    enabled: true
    preload_model: true

  local_stt_service:
    enabled: false

  local_tts_service:
    enabled: false

  savomind_bridge_node:
    enabled: true
    provider_policy: online_first
    allow_local_fallback: false

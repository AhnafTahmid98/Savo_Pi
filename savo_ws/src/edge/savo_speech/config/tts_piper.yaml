tts_node:
  ros__parameters:

    # Models live outside the ROS share tree on the Pi.
    model_dir: "/home/savo/Savo_Pi/models/piper"

    voice_profile: "male"

    male_model_file:  "en_US-ryan-high.onnx"
    male_config_file: "en_US-ryan-high.onnx.json"

    female_model_file:  "en_US-hfc_female-medium.onnx"
    female_config_file: "en_US-hfc_female-medium.onnx.json"

    sample_rate: 22050

    gain: 1.0

    # Slightly slower than default for hallway intelligibility.
    length_scale: 0.95

    noise_scale: 0.667
    noise_w: 0.8

    # Locked to the known working speaker device from sounddevice probing.
    output_device_index: 4

    output_gain: 1.0

    input_text_topic: "/savo_speech/tts_text"

    speech_done_topic: "/savo_speech/tts_done"

    # STT uses this as the self-listening gate.
    tts_speaking_topic: "/savo_speech/tts_speaking"

    mouth_anim_topic: "/savo_speech/mouth_open"

    mouth_anim_rate_hz: 25.0

    # PCM mode gives the UI real audio-driven mouth motion.
    tts_pcm_topic: "/savo_speech/tts_pcm"

    debug_log_text: true

    max_logged_chars: 600

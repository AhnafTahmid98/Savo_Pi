# PC smoke profile — validates C++ VO nodes, topic wiring, and health outputs.
# No direct dependency on savo_realsense. Camera data is consumed only through ROS topics.

rgbd_odometry_node:
  ros__parameters:
    color_image_topic: "/camera/camera/color/image_raw"
    color_camera_info_topic: "/camera/camera/color/camera_info"

    depth_image_topic: "/camera/camera/depth/image_rect_raw"
    depth_camera_info_topic: "/camera/camera/depth/camera_info"

    odom_topic: "/vo/odom/raw"
    status_topic: "/vo/status"
    health_topic: "/vo/health"
    tracking_quality_topic: "/vo/tracking_quality"

    odom_frame: "odom"
    base_frame: "base_link"
    camera_frame: "camera_color_optical_frame"

    max_image_delay_s: 0.20
    max_depth_delay_s: 0.20

    min_features: 40
    good_features_target: 150
    max_features: 400

    min_tracking_quality: 0.25
    max_translation_jump_m: 0.20
    max_rotation_jump_rad: 0.25

    publish_tf: false
    publish_diagnostics: true

vo_republisher_node:
  ros__parameters:
    odom_raw_topic: "/vo/odom/raw"
    odom_topic: "/vo/odom"

    odom_frame: "odom"
    base_frame: "base_link"

vo_health_node:
  ros__parameters:
    odom_topic: "/vo/odom"
    status_topic: "/vo/status"
    health_topic: "/vo/health"

    stale_timeout_s: 0.75

vo_diagnostics_node:
  ros__parameters:
    status_topic: "/vo/status"
    health_topic: "/vo/health"
    diagnostics_topic: "/diagnostics"

    diagnostics_rate_hz: 2.0

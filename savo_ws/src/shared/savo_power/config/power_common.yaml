"/**":
  ros__parameters:
    i2c_bus: 1

    ups_address: 54          # 0x36
    ads7830_address: 72      # 0x48
    ads7830_channel: 2
    ads7830_pcb_version: "v2"

    sample_rate_hz: 1.0
    publish_rate_hz: 1.0
    stale_timeout_s: 5.0

    ups_low_voltage_v: 3.40
    ups_critical_voltage_v: 3.20

    base_empty_voltage_v: 6.40
    base_low_voltage_v: 7.20
    base_full_voltage_v: 8.40
    base_low_soc_pct: 20.0
    base_full_soc_pct: 95.0

    full_capacity_pct: 95.0

    # Keep false unless shutdown behavior is intentionally validated.
    automatic_shutdown_enabled: false

    core_ups_expected: true
    edge_ups_expected: true
    base_battery_expected: true

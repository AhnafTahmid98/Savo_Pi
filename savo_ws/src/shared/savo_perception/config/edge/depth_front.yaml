# RealSense D435 is mounted about 33 cm above the floor.

depth_front_min_node:
  ros__parameters:
    depth_topic: "/camera/camera/depth/image_rect_raw"
    publish_topic: "/depth/min_front_m"

    publish_hz: 30.0


    # RealSense can briefly pause during startup and USB jitter.
    stale_timeout_s: 1.0
    warn_every_s: 1.0

    # Suppress the initial stale warning while the camera starts.
    startup_grace_s: 1.5

    # RealSense depth publisher is RELIABLE + TRANSIENT_LOCAL.
    depth_qos: "reliable"

    log_rx: false
    log_rx_every_s: 2.0

    # 16UC1 depth images are millimeters.
    depth_scale_m_per_unit: 0.001

    min_valid_m: 0.02
    max_valid_m: 3.00

    # p10 is less jumpy than raw min on speckled depth frames.
    percentile: 10.0

    # ROI is tuned for the current front D435 height.
    roi_x: 0.30   # left
    roi_y: 0.45   # top
    roi_w: 0.40   # width
    roi_h: 0.40   # height
